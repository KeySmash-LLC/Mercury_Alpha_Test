# Candidate Profile — CUSTOMIZE THIS
# Used by job application agents for resume tailoring and form filling

personal:
  full_name: "Your Full Name"
  legal_name: "Your Legal Name"
  preferred_name: "Your Preferred Name"
  pronouns: "they/them"

contact:
  email: "your.email@example.com"
  phone: "+1 555-000-0000"
  website: "https://yourwebsite.dev/"
  github: "https://github.com/your-username"
  linkedin: "https://linkedin.com/in/your-profile"

summary:
  default: >-
    Your default professional summary (2-3 sentences). Mention your
    specializations, key technologies, and what kind of roles you target.
  short: >-
    A shorter version (1-2 sentences) for space-constrained contexts.
  # Add more variants as needed: ai_focused, systems_focused, etc.

education:
  - institution: "Your University"
    degree: "Bachelor of Science"
    field: "Computer Science"
    start_date: "2020-09"
    end_date: "2024-06"
    gpa: 3.5
    activities:
      - "Relevant club or honor society"
    location: "City, State"

work_authorization:
  status: "US Citizen"  # or "Green Card", "H-1B", "F-1 OPT", etc.
  authorized_to_work_in_us: true
  sponsorship_required: false
  note: >-
    Any relevant notes about your work authorization status.

relocate: "Yes"
start: "Immediately"
